<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Cabin - Still Days</title>
  <style>
    /*
      Still Days - a short visual novel in The Cabin's world.

      Design intent: the plates are the fiction; the UI is typography set
      directly on them. No panels, no boxed buttons, no chrome typefaces.
      Hidden state (hold / clarity) is never shown; it warms the image.
      The danger here looks like welcome, so the grading runs inverted:
      the more the room has hold of Nika, the warmer it looks.
    */

    :root {
      --ink: #e9e5db;          /* bone-white prose */
      --ink-dim: #9b978c;
      --amber: #c99a5f;        /* hearth light, used sparingly */
      --reveal: 950ms;         /* per-paragraph fade */
      --crossfade: 1700ms;     /* plate crossfade */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: #020302;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      line-height: 1.66;
      overflow: hidden;
    }

    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0;
    }

    #novel { position: fixed; inset: 0; isolation: isolate; background: #020302; }

    /* --- Plates (two layers, crossfaded) ------------------------------ */

    .plate {
      position: absolute;
      inset: -3%;
      opacity: 0;
      transition: opacity var(--crossfade) ease, filter 2400ms ease, transform 1200ms ease;
      background-size: cover;
      background-position: center;
      transform: translate3d(var(--look-x, 0px), var(--look-y, 0px), 0) scale(1.03);
      filter: var(--grade);
      will-change: opacity, transform;
      z-index: -4;
    }
    .plate.show { opacity: 1; }
    .plate::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 68%, rgba(190, 168, 128, 0.10), rgba(2, 3, 2, 0) 46%);
      opacity: var(--hearth, 0);
      transition: opacity 2400ms ease;
      mix-blend-mode: screen;
    }

    /* Grading by how much the room has hold of her. Warmth is the threat. */
    #novel[data-hold="cold"] .plate { --grade: saturate(0.78) contrast(1.06) brightness(0.78); --hearth: 0; }
    #novel[data-hold="warm"] .plate { --grade: saturate(0.94) contrast(1.02) brightness(0.9) sepia(0.12); --hearth: 0.5; }
    #novel[data-hold="held"] .plate { --grade: saturate(1.05) contrast(0.98) brightness(1.0) sepia(0.26); --hearth: 1; }

    /* The refusal: the warmth goes out of everything. */
    #novel[data-refused="1"] .plate {
      --grade: saturate(0.5) contrast(1.16) brightness(0.62) hue-rotate(-6deg);
      --hearth: 0;
      transition: opacity var(--crossfade) ease, filter 3600ms ease;
    }

    /* Coda: no plate at all. */
    #novel[data-plate="none"] .plate { opacity: 0; }

    /* Slow drift so stillness reads as held breath, not a screenshot. */
    .plate { animation: drift 44s ease-in-out infinite alternate; }
    @keyframes drift {
      from { background-position: 48.5% 49%; }
      to   { background-position: 51.5% 51%; }
    }

    /* Mist, very faint, screen-blended over the plate. */
    #mist {
      position: absolute; inset: -8%;
      pointer-events: none;
      background:
        radial-gradient(42% 30% at 22% 72%, rgba(178, 190, 184, 0.05), transparent 70%),
        radial-gradient(50% 34% at 74% 78%, rgba(168, 184, 178, 0.045), transparent 70%);
      filter: blur(9px);
      animation: mistDrift 38s ease-in-out infinite alternate;
      z-index: -3;
    }
    @keyframes mistDrift {
      from { transform: translate3d(-2.5%, 0, 0) scale(1.04); opacity: 0.5; }
      to   { transform: translate3d(2.5%, -1.5%, 0) scale(1.1); opacity: 0.9; }
    }

    /* Vignette and reading scrim: the only darkness we add. */
    #scrim {
      position: absolute; inset: 0;
      pointer-events: none;
      background:
        radial-gradient(130% 105% at 50% 36%, transparent 46%, rgba(0, 0, 0, 0.62) 100%),
        linear-gradient(to top, rgba(2, 3, 2, 0.94) 0%, rgba(2, 3, 2, 0.68) 30%, rgba(2, 3, 2, 0.26) 52%, transparent 70%);
      z-index: -2;
    }

    #grain {
      position: absolute; inset: -14%;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='190' height='190'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
      opacity: 0.055;
      mix-blend-mode: screen;
      animation: grainShift 0.6s steps(2) infinite;
      z-index: 3;
    }
    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-1.2%, 0.8%); }
      100% { transform: translate(0.9%, -1.1%); }
    }

    /* --- Quiet frame ---------------------------------------------------- */

    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 1.05rem clamp(1.1rem, 3vw, 2.4rem);
      z-index: 4;
      font-size: 0.92rem;
    }
    #topbar a, #topbar button {
      color: var(--ink-dim);
      opacity: 0.75;
      text-decoration: none;
      font-style: italic;
      letter-spacing: 0.04em;
      transition: color 240ms ease, opacity 240ms ease;
      padding: 0.2rem 0;
    }
    #topbar a:hover, #topbar a:focus-visible,
    #topbar button:hover, #topbar button:focus-visible {
      color: var(--ink);
      opacity: 1;
      outline: none;
    }

    /* Transient movement title, cinema-style, then gone. */
    #sceneTitle {
      position: absolute;
      left: 0; right: 0; top: 30%;
      text-align: center;
      font-variant: small-caps;
      letter-spacing: 0.34em;
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      color: rgba(233, 229, 219, 0.82);
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.9);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }
    #sceneTitle.show { animation: titlePass 3400ms ease forwards; }
    @keyframes titlePass {
      0% { opacity: 0; transform: translateY(6px); }
      22% { opacity: 1; transform: translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* --- The page of prose ------------------------------------------------ */

    #page {
      position: absolute;
      left: clamp(1.15rem, 6vw, 5.5rem);
      right: clamp(1.15rem, 6vw, 5.5rem);
      bottom: clamp(1.3rem, 4.5vh, 3rem);
      max-width: 37rem;
      z-index: 2;
    }

    #prose {
      font-size: clamp(1.04rem, 1.15vw + 0.72rem, 1.24rem);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95), 0 2px 26px rgba(0, 0, 0, 0.85);
    }
    #prose p { margin: 0 0 0.8em; }
    #prose p:last-child { margin-bottom: 0; }
    #prose em { color: #cfc6b4; }
    #prose p {
      opacity: 0;
      transform: translateY(7px);
      transition: opacity var(--reveal) ease, transform var(--reveal) ease;
    }
    #prose p.in { opacity: 1; transform: none; }

    /* Choices are typography, not widgets. */
    #choices { margin-top: 1.15rem; display: flex; flex-direction: column; gap: 0.28rem; }

    .choice {
      display: block;
      width: fit-content;
      max-width: 100%;
      text-align: left;
      padding: 0.34rem 0.4rem 0.34rem 1.35rem;
      position: relative;
      color: #cdc8bc;
      font-size: clamp(1rem, 1vw + 0.7rem, 1.16rem);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95), 0 2px 22px rgba(0, 0, 0, 0.85);
      opacity: 0;
      transform: translateY(7px);
      transition: opacity 620ms ease, transform 620ms ease, color 200ms ease;
    }
    .choice.in { opacity: 1; transform: none; }
    .choice::before {
      content: "\203A";
      position: absolute;
      left: 0.42rem;
      color: rgba(201, 154, 95, 0.6);
      transition: color 200ms ease, transform 200ms ease;
    }
    .choice:hover, .choice:focus-visible {
      color: #f4efe3;
      outline: none;
    }
    .choice:hover::before, .choice:focus-visible::before {
      color: var(--amber);
      transform: translateX(2px);
    }
    .choice:focus-visible { text-decoration: underline dotted rgba(201, 154, 95, 0.55); text-underline-offset: 0.32em; }

    /* Continue affordance: a soft caret, click anywhere. */
    #caret {
      margin-top: 1.05rem;
      width: fit-content;
      color: var(--ink-dim);
      font-size: 1.25rem;
      line-height: 1;
      padding: 0.15rem 0.55rem;
      animation: caretPulse 2.6s ease-in-out infinite;
      user-select: none;
    }
    #caret:focus-visible { outline: none; color: var(--ink); }
    #caret.gone { display: none; }
    #caret.idle { visibility: hidden; animation: none; }
    @keyframes caretPulse { 0%, 100% { opacity: 0.28; } 50% { opacity: 0.85; } }

    /* --- Title and end cards ---------------------------------------------- */

    #card {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0.55rem;
      z-index: 2;
      opacity: 0;
    }
    #card.in { animation: cardIn 2400ms ease forwards; }
    @keyframes cardIn { to { opacity: 1; } }

    #card .kicker {
      font-variant: small-caps;
      letter-spacing: 0.4em;
      font-size: 0.92rem;
      color: var(--ink-dim);
    }
    #card h2 {
      font-weight: normal;
      font-size: clamp(2.5rem, 8vh, 4.4rem);
      letter-spacing: 0.05em;
      text-shadow: 0 2px 34px rgba(0, 0, 0, 0.95);
    }
    #card .epigraph {
      margin-top: 1.15rem;
      max-width: 26rem;
      color: var(--ink-dim);
      font-style: italic;
      line-height: 1.8;
      white-space: pre-line;
    }
    #card .enter {
      margin-top: 2.6rem;
      font-size: 1.08rem;
      color: #cdc8bc;
      padding: 0.4rem 1.2rem 0.4rem 2rem;
      position: relative;
      animation: caretPulse 3.2s ease-in-out infinite;
      transition: color 220ms ease;
    }
    #card .enter::before {
      content: "\203A";
      position: absolute; left: 1rem;
      color: rgba(201, 154, 95, 0.6);
      transition: color 220ms ease;
    }
    #card .enter:hover, #card .enter:focus-visible { color: #f4efe3; outline: none; animation: none; }
    #card .enter:hover::before, #card .enter:focus-visible::before { color: var(--amber); }

    /* --- Author debug overlay (?debug=1 or press d) ------------------------ */

    #debug {
      position: fixed;
      top: 0.6rem; left: 0.6rem;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      line-height: 1.55;
      color: #7e967e;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid #223022;
      border-radius: 3px;
      padding: 0.45rem 0.65rem;
      white-space: pre;
      pointer-events: none;
      z-index: 40;
    }

    .hidden { display: none !important; }

    /* --- Small screens ------------------------------------------------------ */

    @media (max-width: 700px) {
      #page {
        left: 1.05rem; right: 1.05rem; bottom: 1.05rem;
        max-width: none;
        max-height: 60svh;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: none;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 1.6rem, #000 100%);
                mask-image: linear-gradient(to bottom, transparent 0, #000 1.6rem, #000 100%);
      }
      #page::-webkit-scrollbar { display: none; }
      #scrim {
        background:
          radial-gradient(150% 100% at 50% 30%, transparent 42%, rgba(0, 0, 0, 0.66) 100%),
          linear-gradient(to top, rgba(2, 3, 2, 0.95) 0%, rgba(2, 3, 2, 0.8) 34%, rgba(2, 3, 2, 0.28) 56%, transparent 74%);
      }
      #topbar { font-size: 0.85rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .plate, #mist, #grain, #caret, #card .enter { animation: none !important; }
      #prose p, .choice { transition-duration: 1ms !important; }
      .plate { transition-duration: 200ms; }
      #sceneTitle.show { animation-duration: 1ms; opacity: 0; }
    }
  </style>
</head>
<body>
  <main id="novel" data-hold="cold" data-plate="arrival">
    <h1 class="visually-hidden">The Cabin - Still Days</h1>

    <div class="plate" id="plateA" aria-hidden="true"></div>
    <div class="plate" id="plateB" aria-hidden="true"></div>
    <div id="mist" aria-hidden="true"></div>
    <div id="scrim" aria-hidden="true"></div>
    <div id="grain" aria-hidden="true"></div>

    <header id="topbar">
      <a href="index.html">The Cabin</a>
      <button type="button" id="restart" class="hidden">Begin again</button>
    </header>

    <div id="sceneTitle" aria-hidden="true"></div>

    <section id="page" aria-live="polite">
      <div id="prose"></div>
      <div id="choices"></div>
      <button type="button" id="caret" class="gone" aria-label="Continue">&#8964;</button>
    </section>

    <section id="card" class="hidden"></section>

    <div id="debug" class="hidden"></div>
  </main>

  <script>
    (function () {
      "use strict";

      /*
        Still Days adapts the closing movement of the prose story
        "No Further": Nika's last visit to the cabin, the room made
        ready for her, the refusal, and the voicemail Elli will later
        play in the terminal game. The refusal and the voicemail are
        canon and fixed. Choices decide what the visit costs her and
        what she carries home. The thing in the woods is never named,
        never shown, never explained.

        Hidden state:
          hold    - how much of the welcome she has accepted
          clarity - what she has let herself see and know

        Both are surfaced only as atmosphere and variant lines. The
        plate grading warms as hold rises: comfort is the threat.
      */

      const PLATES = {
        arrival: "assets/vn/arrival-illustrated.png",
        threshold: "assets/vn/threshold-illustrated.png",
        interior: "assets/vn/interior-illustrated.png",
        window: "assets/vn/window-illustrated.png",
      };

      // The seam for the design doc's "AI-disturbed surface": authored
      // plot, authored scenes, authored choices; an AI pass may one day
      // perturb wording here, and nothing else. Identity for now.
      function disturb(text /*, state */) { return text; }

      const START = { hold: 0, clarity: 0, flags: {} };
      let state = structuredClone(START);
      let current = "title";
      let revealTimers = [];
      let advance = null;
      let revealing = false;
      let lastMovement = null;
      let refused = false;
      let debugOn = new URLSearchParams(location.search).has("debug");

      const NODES = {

        title: {
          kind: "title",
          plate: "arrival",
          heading: "Still Days",
          epigraph: "Still days. Distances wrong. No further.\nNika goes back anyway.",
          begin: "road_1",
        },

        /* ---- The Lake Road ------------------------------------------- */

        road_1: {
          plate: "arrival",
          movement: "The Lake Road",
          text: [
            "The last kilometre takes the sound out of the car piece by piece. First the heater fan. Then the tyres. Then the small rattle in the passenger door that has been there for three years. Nika drives the rest of the way inside a quiet that is not hers.",
            "The cabin appears all at once. Low roof, dark wall, the small window holding a steady square of light. Elli's family place. In town it still belongs to the dead before it belongs to anyone living, and the dead do not light lamps.",
            "She parks by the wood store and leaves both hands on the wheel. The dashboard clock changes. 12:31. 12:32.",
          ],
          choices: [
            { label: "Get out before the quiet can settle.", effects: { clarity: 1 }, goto: "road_out" },
            { label: "Watch the door for one full minute.", effects: { clarity: 2 }, goto: "road_watch" },
            { label: "Check her phone. One bar, if she leans towards the road.", effects: { clarity: 1 }, set: { draftedText: true }, goto: "road_phone" },
          ],
        },

        road_out: {
          plate: "arrival",
          movement: "The Lake Road",
          text: [
            "The cold is sharp and ordinary. It bites her cheeks and puts water in her eyes. Her boots break the crust, and each step sounds exactly as a step should. She takes the sound personally.",
          ],
          next: "door_1",
        },

        road_watch: {
          plate: "arrival",
          movement: "The Lake Road",
          text: [
            "Nothing moves at the window. Nothing is about to. Frost slides from a pine branch in one loose white sheet and lands without a sound she can hear.",
            "The clearing is not empty, she thinks. It is emptied. There is a difference, and the difference is recent.",
          ],
          next: "door_1",
        },

        road_phone: {
          plate: "arrival",
          movement: "The Lake Road",
          text: [
            "One bar, if she leans towards the road. She types: <em>going up now.</em> She looks at it. Elli is asleep in the wrong part of her day, an ocean west of here.",
            "Nika deletes the message and pockets the phone. Some things you say afterwards, or not at all.",
          ],
          next: "door_1",
        },

        /* ---- The Door -------------------------------------------------- */

        door_1: {
          plate: "threshold",
          movement: "The Door",
          text: [
            "The key lives under the north log, wrapped in black plastic, because Elli still believes in the hiding places of childhood. Nika does not go to it.",
            "The door is ajar. Ten centimetres of warm light, top to bottom. She locked it last time. She remembers the latch setting, the second pull on the handle, the key going back under the log.",
            "Warm air moves in the gap. There is no one in the cabin to be warm.",
          ],
          choices: [
            { label: "Push it open with two fingers.", effects: { hold: 1 }, goto: "door_push" },
            { label: "Walk the wall first. Check the camera. Do the work.", effects: { clarity: 3 }, set: { checkedCamera: true }, goto: "door_wall" },
            { label: "Announce herself. If someone is in there, better to know.", effects: { hold: 3 }, set: { gaveVoice: true }, goto: "door_call" },
          ],
        },

        door_push: {
          plate: "threshold",
          movement: "The Door",
          text: [
            "The door swings without complaint. Warmth comes out to meet her. Not the narrow heat around a new fire. Whole-room warmth, lived-in warmth, carrying woodsmoke and dry wool and coffee.",
            "It is the smell of the place being looked after. Nobody has been looking after it.",
          ],
          next: "room_1",
        },

        door_wall: {
          plate: "threshold",
          movement: "The Door",
          text: [
            "The northern camera sits under the eave, green light steady. No damage. No tracks beneath it. The frost on the bracken is white and exact, every frond finished, like work that wants to be admired.",
            "Nothing has walked this clearing in days. Behind her, warmth moves patiently in the gap of the door, waiting for her to be done.",
          ],
          next: "room_1",
        },

        door_call: {
          plate: "threshold",
          movement: "The Door",
          text: [
            "“It's Nika.”",
            "The words go into the gap and do not come back. No echo off the far wall. The room takes them the way dark water takes a stone.",
            "She stands with her name gone and the door open ten centimetres, and understands, in a small cold way, that she has given something away.",
          ],
          next: "room_1",
        },

        /* ---- The Room --------------------------------------------------- */

        room_1: {
          plate: "interior",
          movement: "The Room",
          text: [
            "The fire is burning low and steady. Not freshly lit. The logs have collapsed inward and glow along their centres. Someone fed this fire hours ago and stayed near enough to keep it even. There is no one. There has been no one for two weeks.",
            "The chairs stand in a half-circle at the hearth, and the one nearest the fire is turned out from the others by the width of a hand. The kettle sits on the stove. The floor is swept. The table is laid for one.",
            "Everything is exactly right. That is the wrongness. She holds it as one fact, the way you hold a splinter still until the tweezers come.",
          ],
          choices: [
            { label: "Sit down. Just for a minute. Her knees have earned it.", effects: { hold: 4 }, set: { satDown: true }, goto: "room_sit" },
            { label: "Stay standing and list the room out loud, like stock-taking.", effects: { clarity: 3 }, goto: "room_list" },
            { label: "Cross to the shelf. The green book.", effects: { clarity: 2, hold: 1 }, set: { touchedBook: true }, goto: "room_book" },
            { label: "Hold a hand out. Find where the warmth stops.", effects: { clarity: 4 }, set: { sawBorder: true }, goto: "room_border" },
          ],
        },

        room_sit: {
          plate: "interior",
          movement: "The Room",
          text: [
            "The chair takes her weight the way water takes a swimmer. Elli at twelve slept in this chair, head sideways, after the lake. Nika covered her feet without waking her. The memory arrives warm and asks for nothing.",
            "Her shoulders come down. The tiredness she has carried for days sets its bags down beside her. Somewhere behind her, very quietly, the kettle begins to consider boiling.",
          ],
          next: "glass_1",
        },

        room_list: {
          plate: "interior",
          movement: "The Room",
          text: [
            "“Table. Kettle. Chairs.” Her voice is level. “Floor swept. Ash cleaned. Fire fed.”",
            "The list should make the room smaller. Each word should nail one thing to the floor. But the words go out and the room accepts them, patiently, like a shopkeeper letting a child count sweets she cannot pay for.",
          ],
          next: "glass_1",
        },

        room_book: {
          plate: "interior",
          movement: "The Room",
          text: [
            "The green book stands spine-out, flush with the others, exactly as a book stands when it has been put away by someone who knows it is being watched.",
            "She does not take it down. On the shelf edge, where dust should be, there is no dust. The book has been read. She does not want to know which page it is holding open inside itself.",
          ],
          next: "glass_1",
        },

        room_border: {
          plate: "interior",
          movement: "The Room",
          text: [
            "She holds out one hand and walks it through the air like a spirit level. Warm across the fingers. Warm at the wrist. Then, half a metre from the hearthstone, a border. Cold on one side, clean as the edge of a pane.",
            "The fire's warmth does not fade. It stops. Heat that obeys a line is not heat. It is a hand, held out.",
          ],
          next: "glass_1",
        },

        /* ---- The Glass --------------------------------------------------- */

        glass_1: {
          plate: "window",
          movement: "The Glass",
          pace: "slow",
          text: function (s) {
            const out = [
              "The window over the sill holds the room behind her. Lantern. Chairs. The table laid for one.",
            ];
            if (s.flags.satDown) {
              out.push("In the glass, the chair she sat in is still occupied. She is standing at the window, and the reflection has not finished getting up.");
            } else {
              out.push("In the glass, the room is longer than it is. The far wall stands further back than any wall she has ever put a hand on, and the dark back there is furnished.");
            }
            if (s.flags.touchedBook) {
              out.push("On the shelf in the glass, the green book stands open. She left it closed. She does not turn round.");
            }
            out.push("No one lit that fire. She lets the fact finish. No one swept the floor. No one turned the chair. The room was made ready. For her, or for anyone. For whoever could be made to stay.");
            return out;
          },
          next: "refuse_1",
        },

        /* ---- The Refusal -------------------------------------------------- */

        refuse_1: {
          plate: "window",
          movement: "The Glass",
          pace: "slow",
          text: function (s) {
            const out = [
              "The warmth crosses the room and finds the back of her neck, gentle as a hand that knows her. The chair nearest the fire waits, turned out, patient. The kettle is nearly ready. It would be the easiest thing in the world to stay. It is built to be.",
            ];
            if (s.flags.gaveVoice) {
              out.push("The room has her name. It has not spent it yet.");
            }
            out.push("The old part of her, the part that checks ice before stepping onto it and smells meat before it reaches her nose, has been pulling at her sleeve since the door. She listens to it now.");
            return out;
          },
          choices: function (s) {
            const out = [
              { label: "Say it. One word. Out loud.", goto: "refuse_no" },
            ];
            if (!s.flags.satDown && s.hold < 6) {
              out.push({ label: "Step back over the threshold. Keep the word for the doorway.", goto: "refuse_back" });
            }
            if (s.flags.satDown) {
              out.push({ label: "Stand up. However long it takes.", goto: "refuse_stand" });
            }
            return out;
          },
        },

        refuse_no: {
          plate: "window",
          movement: "The Glass",
          pace: "slow",
          refuse: true,
          text: function (s) {
            const out = [
              "“No.”",
              "The fire dims. It does not gutter. It dims, the way a light is turned down by someone who has taken the answer badly and will not make a scene.",
            ];
            if (s.flags.sawBorder) {
              out.push("Warmth withdraws from her boots, her knees, the back of her neck. The clean edge she found with her hand is everywhere now.");
            } else {
              out.push("Warmth withdraws from her boots, her knees, the back of her neck. The room beneath the room comes through. Cold, wide, patient.");
            }
            out.push("The chairs do not move. That is the worst of it. Nothing moves at all.");
            return out;
          },
          next: "after_1",
        },

        refuse_back: {
          plate: "window",
          movement: "The Glass",
          pace: "slow",
          refuse: true,
          text: [
            "She goes backwards, one even step at a time, giving the room nothing to read. The warmth follows her as far as it can, hopeful as a dog at a gate.",
            "At the threshold her mouth makes the word anyway, quiet, the way you close a door you respect.",
            "“No.”",
            "The fire dims. Cold comes up through the boards as though it had never been anywhere else.",
          ],
          next: "after_1",
        },

        refuse_stand: {
          plate: "window",
          movement: "The Glass",
          pace: "slow",
          refuse: true,
          text: [
            "Standing is work. The chair does not hold her; nothing so crude. It is simply that every reason to stay has been arranged within reach, and the reasons are all true, and they are all hers.",
            "She stands into the cold air above the warmth and hears her own voice arrive from a long way off.",
            "“No.”",
            "The fire dims. The kettle, which was nearly ready, quietly stops considering it.",
          ],
          next: "after_1",
        },

        /* ---- After --------------------------------------------------------- */

        after_1: {
          plate: "threshold",
          movement: "After",
          text: function (s) {
            const out = [
              "Outside, the air strikes her face with clean force. The silence has its hard edge back. She pulls the door shut. The latch resists once, then sets. She locks it, and the key shakes against the ring, one small bright sound, the only honest one all day.",
            ];
            if (s.flags.checkedCamera) {
              out.push("Under the eave the green light burns on, steady and useless, watching a clearing where nothing will ever be caught again.");
            }
            out.push("She puts the key back under the north log, because it is Elli's key and Elli's log, and walks to the car without looking back. The engine starts on the second try. Behind her the cabin keeps very still, and lets her go. Nothing follows. Nothing needs to.");
            return out;
          },
          next: "coda_1",
        },

        /* ---- Coda: her kitchen, the voicemail ------------------------------- */

        coda_1: {
          plate: null,
          pace: "slow",
          text: function (s) {
            const out = [
              "Midnight. Her own kitchen, her own table, coffee gone cold in a white mug bought in a pack of four. The house makes its useful sounds. Radiator. Fridge. Timber settling because heat leaves it, which is a reason.",
            ];
            if (s.flags.draftedText) {
              out.push("The unsent message is still in the phone. <em>going up now.</em> Written by a person who thought this was about a camera.");
            } else {
              out.push("On the back of a receipt, in her own writing: <em>It wanted me to leave.</em> Crossed out. <em>It wanted me to come back.</em> Crossed out twice.");
            }
            out.push("She calls Elli. The line rings long enough that she can see her own face in the dark window over the sink. One cheekbone. One eye. Voicemail picks up.");
            return out;
          },
          next: "coda_2",
        },

        coda_2: {
          plate: null,
          pace: "slow",
          text: function (s) {
            const out = [
              "“Elli. It's me. You need to come home.”",
              "“Something's wrong with the cabin. I don't know what.”",
              "“Don't go up on your own. Wait.”",
            ];
            if (s.clarity >= 6) {
              out.push("There is a word for it. She can feel the word coming, the way you feel weather. It starts to arrive, shaped like the frost climbing the glass in front of her, and she stops it. Some things you do not finish. Not at your own table. Not at night.");
            } else if (s.hold >= 6) {
              out.push("She does not say: it was warm. She does not say: the chair remembered me. Some true things are shaped like invitations, and she will not pass one on.");
            } else {
              out.push("Frost has spread from the lower left corner of the glass while she sat there. Thin branches, pale against black, reaching for the reflection of her face.");
            }
            out.push("“It's lying out there,” she says. “Waiting.”");
            return out;
          },
          next: "coda_3",
        },

        coda_3: {
          plate: null,
          pace: "slow",
          text: [
            "She ends the call and sits with her hand around the phone.",
            "Outside, the first snow falls through motionless air, straight down, thickening the yard, the road, the stacked wood by the shed.",
            "She cannot see the cabin from here. The kitchen wall stays where it is. North stays behind it.",
          ],
          next: "end",
        },

        end: {
          kind: "end",
          plate: null,
        },
      };

      /* ---- Engine --------------------------------------------------------- */

      const novel = document.getElementById("novel");
      const page = document.getElementById("page");
      const plateA = document.getElementById("plateA");
      const plateB = document.getElementById("plateB");
      const prose = document.getElementById("prose");
      const choicesEl = document.getElementById("choices");
      const caret = document.getElementById("caret");
      const card = document.getElementById("card");
      const sceneTitle = document.getElementById("sceneTitle");
      const restartBtn = document.getElementById("restart");
      const debugEl = document.getElementById("debug");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      Object.values(PLATES).forEach((src) => { const i = new Image(); i.src = src; });

      let activePlate = null;   // which key is showing
      let frontIsA = true;

      const resolve = (v) => (typeof v === "function" ? v(state) : v);
      const clearTimers = () => { revealTimers.forEach(clearTimeout); revealTimers = []; };

      function applyEffects(effects) {
        if (!effects) return;
        for (const key of ["hold", "clarity"]) {
          if (key in effects) state[key] = Math.max(0, Math.min(20, state[key] + effects[key]));
        }
      }

      function holdTier() {
        if (state.hold >= 6) return "held";
        if (state.hold >= 3) return "warm";
        return "cold";
      }

      function setPlate(key) {
        if (key === activePlate) return;
        activePlate = key;
        novel.dataset.plate = key || "none";
        if (!key) { plateA.classList.remove("show"); plateB.classList.remove("show"); return; }
        const front = frontIsA ? plateB : plateA;  // incoming
        const back = frontIsA ? plateA : plateB;   // outgoing
        front.style.backgroundImage = "url(\"" + PLATES[key] + "\")";
        void front.offsetWidth;
        front.classList.add("show");
        back.classList.remove("show");
        frontIsA = !frontIsA;
      }

      function updateAtmosphere() {
        novel.dataset.hold = holdTier();
        novel.dataset.refused = refused ? "1" : "0";
        renderDebug();
      }

      function renderDebug() {
        debugEl.classList.toggle("hidden", !debugOn);
        if (!debugOn) return;
        const flags = Object.keys(state.flags).filter((k) => state.flags[k]);
        debugEl.textContent =
          "node     " + current + "\n" +
          "hold     " + state.hold + "  (" + holdTier() + ")\n" +
          "clarity  " + state.clarity + "\n" +
          "refused  " + refused + "\n" +
          "flags    " + (flags.join(", ") || "none");
      }

      function showMovement(node) {
        if (!node.movement || node.movement === lastMovement) return;
        lastMovement = node.movement;
        sceneTitle.textContent = node.movement;
        sceneTitle.classList.remove("show");
        void sceneTitle.offsetWidth;
        sceneTitle.classList.add("show");
      }

      function runNode(id) {
        const node = NODES[id];
        if (!node) { console.error("Unknown node:", id); return; }
        current = id;

        clearTimers();
        advance = null;
        revealing = false;
        choicesEl.innerHTML = "";
        caret.classList.add("gone");
        caret.classList.remove("idle");
        page.scrollTop = 0;

        if (node.refuse) refused = true;
        setPlate(node.plate === undefined ? activePlate : node.plate);
        updateAtmosphere();

        if (node.kind === "title") return showTitle(node);
        if (node.kind === "end") return showEnd(node);

        card.classList.add("hidden");
        showMovement(node);

        const paragraphs = resolve(node.text) || [];
        prose.innerHTML = "";
        const nodes = paragraphs.map((p) => {
          const el = document.createElement("p");
          el.innerHTML = disturb(p, state);
          prose.appendChild(el);
          return el;
        });

        // Interactions enter the layout now, invisible, so the block's
        // height is settled before the first paragraph fades in and
        // nothing shifts upward as the text arrives.
        buildInteractions(node);

        const slow = node.pace === "slow";
        const stagger = reduceMotion.matches ? 0 : (slow ? 1400 : 900);
        const lead = reduceMotion.matches ? 0 : 300;

        revealing = true;
        let t = lead;
        nodes.forEach((el) => {
          revealTimers.push(setTimeout(() => el.classList.add("in"), t));
          t += stagger;
        });
        revealTimers.push(setTimeout(() => {
          revealing = false;
          revealInteractions(node);
        }, Math.max(t - stagger + (reduceMotion.matches ? 0 : 550), 0)));
      }

      function showAllNow(node) {
        clearTimers();
        revealing = false;
        prose.querySelectorAll("p").forEach((p) => p.classList.add("in"));
        revealInteractions(node);
      }

      function buildInteractions(node) {
        const choices = resolve(node.choices);
        if (choices && choices.length) {
          choices.forEach((c) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "choice";
            btn.tabIndex = -1;
            btn.innerHTML = disturb(c.label, state);
            btn.addEventListener("click", (ev) => {
              ev.stopPropagation();
              if (revealing) { showAllNow(node); return; }
              if (!btn.classList.contains("in")) return;
              applyEffects(c.effects);
              if (c.set) Object.assign(state.flags, c.set);
              updateAtmosphere();
              runNode(resolve(c.goto));
            });
            choicesEl.appendChild(btn);
          });
        } else if (node.next) {
          caret.classList.remove("gone");
          caret.classList.add("idle");
        }
      }

      function revealInteractions(node) {
        const btns = Array.prototype.slice.call(choicesEl.children);
        if (btns.length) {
          btns.forEach((btn, i) => {
            revealTimers.push(setTimeout(() => {
              btn.tabIndex = 0;
              btn.classList.add("in");
            }, 160 + i * 200));
          });
        } else if (node.next) {
          caret.classList.remove("idle");
          advance = () => runNode(resolve(node.next));
        }
      }

      /* ---- Cards ----------------------------------------------------------- */

      function showTitle(node) {
        lastMovement = null;
        prose.innerHTML = "";
        card.className = "";
        card.innerHTML =
          "<div class=\"kicker\">The Cabin</div>" +
          "<h2>" + node.heading + "</h2>" +
          "<div class=\"epigraph\">" + node.epigraph + "</div>" +
          "<button type=\"button\" class=\"enter\">Begin</button>";
        void card.offsetWidth;
        card.classList.add("in");
        restartBtn.classList.add("hidden");
        card.querySelector(".enter").addEventListener("click", (ev) => {
          ev.stopPropagation();
          state = structuredClone(START);
          refused = false;
          updateAtmosphere();
          restartBtn.classList.remove("hidden");
          runNode(node.begin);
        });
      }

      function showEnd() {
        prose.innerHTML = "";
        card.className = "";
        card.innerHTML =
          "<div class=\"kicker\">The Cabin</div>" +
          "<h2>Still Days</h2>" +
          "<button type=\"button\" class=\"enter\">Begin again</button>";
        void card.offsetWidth;
        card.classList.add("in");
        card.querySelector(".enter").addEventListener("click", (ev) => {
          ev.stopPropagation();
          restart();
        });
      }

      function restart() {
        state = structuredClone(START);
        refused = false;
        lastMovement = null;
        updateAtmosphere();
        runNode("title");
      }

      /* ---- Input ------------------------------------------------------------ */

      function handleAdvance() {
        if (revealing) { showAllNow(NODES[current]); return; }
        if (advance) { const go = advance; advance = null; go(); }
      }

      restartBtn.addEventListener("click", (ev) => { ev.stopPropagation(); restart(); });
      caret.addEventListener("click", (ev) => { ev.stopPropagation(); handleAdvance(); });

      document.addEventListener("click", (ev) => {
        if (ev.target.closest(".choice, .enter, #topbar, #card")) return;
        handleAdvance();
      });

      document.addEventListener("keydown", (ev) => {
        if (ev.altKey || ev.ctrlKey || ev.metaKey) return;
        if (ev.key === "d" || ev.key === "D") { debugOn = !debugOn; renderDebug(); return; }
        if (ev.key === " " || ev.key === "Enter") {
          if (ev.target.closest("button, a")) return;
          ev.preventDefault();
          handleAdvance();
          return;
        }
        const index = Number(ev.key) - 1;
        if (index >= 0 && index < choicesEl.children.length) {
          ev.preventDefault();
          choicesEl.children[index].click();
        }
      });

      /* ---- Parallax look (guarded) ------------------------------------------ */

      let lookFrame = 0, lookX = 0, lookY = 0;
      novel.addEventListener("pointermove", (ev) => {
        if (reduceMotion.matches) return;
        lookX = ((ev.clientX / window.innerWidth) - 0.5) * -8;
        lookY = ((ev.clientY / window.innerHeight) - 0.5) * -5;
        if (!lookFrame) {
          lookFrame = requestAnimationFrame(() => {
            lookFrame = 0;
            [plateA, plateB].forEach((p) => {
              p.style.setProperty("--look-x", lookX.toFixed(2) + "px");
              p.style.setProperty("--look-y", lookY.toFixed(2) + "px");
            });
          });
        }
      });

      /* ---- Boot -------------------------------------------------------------- */

      updateAtmosphere();
      runNode("title");
    })();
  </script>
</body>
</html>
